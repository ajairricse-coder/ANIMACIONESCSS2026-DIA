<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proyecto Final - Animación de Gráficos</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Estilos Personalizados -->
    <link rel="stylesheet" href="ar.css">
</head>
<body>

    <!-- Fondo Interactivo Canvas -->
    <canvas id="bg-canvas"></canvas>

    <!-- Barra de Navegación -->
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="#">AG // 2026</a>
        </div>
    </nav>

    <!-- Sección Principal con Visor Embed -->
    <main class="container my-4 my-md-5">
        <div class="row justify-content-center text-center mb-4">
            <div class="col-12 col-md-10 col-lg-8">
                <span class="badge-custom mb-3">Presentación Final</span>
                <h1 class="hero-title mb-2">Proyecto Final: Animación de Gráficos</h1>
                <p class="hero-text">Visualización interactiva e inmersiva en Realidad Aumentada.</p>
            </div>
        </div>

        <!-- Panel Proyector de la App -->
        <div class="row justify-content-center">
            <div class="col-12 col-xl-11">
                <div class="app-projector-container">
                    <div class="iframe-wrapper">
                        <iframe src="https://mywebar.com/pi/951297"
                                frameborder="0"
                                scrolling="yes"
                                seamless="seamless"
                                allow="camera;gyroscope;accelerometer;magnetometer;xr-spatial-tracking;microphone;">
                        </iframe>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Pie de página -->
    <footer class="text-center py-4">
        <div class="container">
            <p class="m-0">© 2026 - Proyecto Final de Animación de Gráficos | Diseñado con Lila & Guinda</p>
        </div>
    </footer>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/bootstrap.bundle.min.js"></script>

    <!-- SCRIPT DE ANIMACIÓN GRÁFICA EN CANVAS DE FONDO -->
    <script>
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let particles = [];

        function initCanvas() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            createParticles();
        }

        window.addEventListener('resize', initCanvas);

        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 2.5 + 1;
                this.speedX = (Math.random() - 0.5) * 1.2;
                this.speedY = (Math.random() - 0.5) * 1.2;
                this.color = Math.random() > 0.5 ? '#a31c3f' : '#c782e8';
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                if (this.x < 0 || this.x > width) this.speedX *= -1;
                if (this.y < 0 || this.y > height) this.speedY *= -1;
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.shadowBlur = 8;
                ctx.shadowColor = this.color;
                ctx.fill();
            }
        }

        function createParticles() {
            particles = [];
            const densityFactor = window.innerWidth < 768 ? 16000 : 10000;
            const count = Math.floor((width * height) / densityFactor);
            for (let i = 0; i < count; i++) {
                particles.push(new Particle());
            }
        }

        function connectParticles() {
            const maxDistance = window.innerWidth < 768 ? 80 : 110;
            for (let a = 0; a < particles.length; a++) {
                for (let b = a; b < particles.length; b++) {
                    let dx = particles[a].x - particles[b].x;
                    let dy = particles[a].y - particles[b].y;
                    let distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < maxDistance) {
                        ctx.strokeStyle = `rgba(199, 130, 232, ${1 - distance / maxDistance})`;
                        ctx.lineWidth = 0.5;
                        ctx.beginPath();
                        ctx.moveTo(particles[a].x, particles[a].y);
                        ctx.lineTo(particles[b].x, particles[b].y);
                        ctx.stroke();
                    }
                }
            }
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            connectParticles();
            requestAnimationFrame(animate);
        }

        initCanvas();
        animate();
    </script>
</body>
</html>
