<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RA por Escaneo de Imagen</title>

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <!-- Estilos Personalizados Vincular ra.css -->
  <link rel="stylesheet" href="ra.css">

  <!-- Librerías de A-Frame y MindAR para WebAR -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>
<body>

  <!-- Escena de Realidad Aumentada apuntando a tu target compilado -->
  <a-scene 
    mindar-image="imageTargetSrc: ../assets/target.mind;" 
    color-space="sRGB" 
    renderer="colorManagement: true, physicallyCorrectLights" 
    vr-mode-ui="enabled: false" 
    device-orientation-permission-ui="enabled: false">

    <a-assets>
      <!-- Tu modelo animado de Blender -->
      <a-asset-item id="miModelo" src="../assets/mode1.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- Objeto anclado al marcador escaneado -->
    <a-entity mindar-image-target="targetIndex: 0">
      <a-gltf-model 
        src="#miModelo" 
        position="0 0 0" 
        scale="0.5 0.5 0.5" 
        rotation="0 0 0"
        animation-mixer> <!-- Este atributo reproduce automáticamente la animación de Blender -->
      </a-gltf-model>
    </a-entity>

  </a-scene>

  <!-- Bootstrap 5 JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
